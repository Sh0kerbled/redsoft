services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure  # ✅
  
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
  
  postgres:
    image: postgres:latest
    container_name: postgres_container
    environment:
      POSTGRES_USER: postgres         # ✅ Removed DB_HOST
      POSTGRES_PASSWORD: 4252642526
      POSTGRES_DB: redsoft_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"  # ✅ Fixed mapping
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d redsoft_db"]
      interval: 5s        # ✅ Faster checks
      timeout: 5s
      retries: 10
      start_period: 10s   # ✅ Grace period
    restart: unless-stopped
    tty: true
    stdin_open: true

volumes:
  pgdata:
    driver: local
